services:
  - type: web
    name: smart-rag
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DISABLE_CROSS_ENCODER
        value: "true"